services:
  adminer:
    image: adminer:4.8.1
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: sqlite
    volumes:
      - ./data/db:/db
    networks:
      - analytics

  analytics:
    build: .
    volumes:
      - .:/app
      - ./data/db:/app/data/db
    environment:
      - DATABASE_URL=sqlite:////app/data/db/bilbao.db
      - BILBAO_TEAM_KEYWORD=SurneBilbao
    networks:
      - analytics
    command: ["tail", "-f", "/dev/null"]

networks:
  analytics:
    driver: bridge
